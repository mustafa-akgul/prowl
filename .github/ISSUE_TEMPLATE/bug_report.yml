name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start the dashboard with ...
        2. Trigger a review for PR ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Dashboard / Web UI
        - CLI / review pipeline
        - GitHub integration
        - Jira integration
        - LLM client (Gemini / Ollama)
        - Celery worker / webhooks
        - RAG / vector store
        - Reports / notifications
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: "OS, Python version, Docker or local, LLM provider"
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste logs here — **remove any API keys or tokens first**.
      render: shell
